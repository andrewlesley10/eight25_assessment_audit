services:
  website-audit-tool:
    build: .
    ports:
      - "3000:3000"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Website Audit Tool}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-15000}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-90000}
